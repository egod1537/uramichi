<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="lantern" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b"/>
      <stop offset="100%" style="stop-color:#c0392b"/>
    </linearGradient>
  </defs>
  
  <!-- 배경 -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  
  <!-- 줄 -->
  <line x1="256" y1="0" x2="256" y2="52" stroke="#8b7355" stroke-width="8" stroke-linecap="round"/>
  
  <!-- 상단 고리 -->
  <rect x="216" y="48" width="80" height="16" rx="6" fill="#8b7355"/>
  
  <!-- 등 본체 (화면 꽉 채움) -->
  <ellipse cx="256" cy="270" rx="170" ry="210" fill="url(#lantern)"/>
  
  <!-- 빛 -->
  <ellipse cx="256" cy="258" rx="110" ry="140" fill="#ff8a80" opacity="0.3"/>
  <ellipse cx="256" cy="245" rx="60" ry="80" fill="#ffab91" opacity="0.2"/>
  
  <!-- 裏 글자 (크게) -->
  <text x="256" y="310" text-anchor="middle" font-family="serif" font-size="210" font-weight="bold" fill="#1a1a2e" opacity="0.85">裏</text>
  
  <!-- 하단 장식 -->
  <rect x="220" y="472" width="72" height="14" rx="5" fill="#8b7355"/>
  
  <!-- 술 -->
  <line x1="236" y1="486" x2="230" y2="512" stroke="#c0392b" stroke-width="5" stroke-linecap="round"/>
  <line x1="256" y1="486" x2="256" y2="512" stroke="#c0392b" stroke-width="5" stroke-linecap="round"/>
  <line x1="276" y1="486" x2="282" y2="512" stroke="#c0392b" stroke-width="5" stroke-linecap="round"/>
  
  <!-- 빛 효과 -->
  <circle cx="256" cy="270" r="220" fill="#ff6b6b" opacity="0.05"/>
</svg>
